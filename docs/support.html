<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - ValleySoft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #1c1c1c;
            --bg-layer-1: #242424;
            --bg-layer-2: #2d2d2d;
            --border-subtle: #3a3a3a;
            --border-strong: #4a4a4a;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --accent-blue: #0078d4;
            --primary-gradient: linear-gradient(135deg, #0078d4 0%, #4facfe 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI Variable", "Segoe UI", "Inter", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
        }

        /* Support Content */
        .support-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        .glass-card {
            background: var(--bg-layer-1);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-strong);
        }

        .glass-card h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .glass-card p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .support-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 36px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: var(--primary-gradient);
            border: none;
            border-radius: 100px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 120, 212, 0.2);
            gap: 12px;
        }

        .support-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 15px 25px rgba(0, 120, 212, 0.4);
        }

        .support-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .support-btn:hover svg {
            transform: translateX(4px);
        }

        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <a href="index.html" class="logo">
                <img src="https://avatars.githubusercontent.com/u/293678929?s=280&v=4" alt="ValleySoft Logo">
                ValleySoft
            </a>
            <div class="nav-links">
                <a href="index.html">Products</a>
                <a href="history.html">Changelog</a>
                <a href="about.html">About</a>
                <a href="support.html" class="active">Support</a>
            </div>
        </nav>
    </div>

    <div class="support-wrapper">
        <div class="container" style="display: flex; justify-content: center;">
            <div class="glass-card">
                <h1>ValleySoft Support</h1>
                <p>Need help with Disk Analyzer? Experiencing an issue or have a feature request? Our team is ready to assist you.</p>
                
                <a href="mailto:valleysoftdev29@gmail.com" class="support-btn">
                    Contact Us
                    <svg viewBox="0 0 24 24">
                        <path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13L4 8V6L12 11L20 6V8Z" />
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <div class="container">
        <footer>
            <p>&copy; 2026 ValleySoft. Crafted for Windows.</p>
            <p style="margin-top: 10px;">
                <a href="privacy.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">Privacy Policy</a>
                <a href="https://github.com/valley-soft" target="_blank" style="color: var(--text-secondary); text-decoration: none;">GitHub</a>
            </p>
        </footer>
    </div>
</body>
</html>
